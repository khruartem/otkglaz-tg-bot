apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}
    spec:
      containers:
      - name: ${APPLICATION_NAME}
        image: ${REGISTRY}/${REGISTRY_REPOSITORY}/${APPLICATION_NAME}:${VERSION}
        resources:
          requests:
            cpu: '250m'
            memory: '256Mi'
          limits:
            cpu: '500m'
            memory: '512Mi'
        envFrom:
        - configMapRef:
          name: ${APPLICATION_NAME}-config
        env:
          - name: TELEGRAM_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: ${APPLICATION_NAME}-${NAMESPACE}
                key: TELEGRAM_BOT_TOKEN
          - name: ADMIN_CHAT_ID
            valueFrom:
              secretKeyRef:
                name: ${APPLICATION_NAME}-${NAMESPACE}
                key: ADMIN_CHAT_ID
        ports:
        - containerPort: 8080